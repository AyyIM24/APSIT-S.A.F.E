# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080

# ========================
# MYSQL DATASOURCE
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/apsit_safe?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=${JWT_SECRET:ApsitSafeDefaultDevKeyPleaseChangeInProduction2026!@#$%}
jwt.expiration=86400000

# ========================
# SQL INIT
# ========================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ========================
# CORS CONFIGURATION
# ========================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ========================
# QR CODE CONFIGURATION
# ========================
app.qr.base-url=${QR_BASE_URL:http://localhost:3000}